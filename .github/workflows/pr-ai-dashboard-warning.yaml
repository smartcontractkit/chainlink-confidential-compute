name: PR AI Dashboard Warning

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  warn-about-degraded-models:
    name: Warn about degraded AI models
    if: >
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) ||
      (
        github.event_name == 'pull_request_target' &&
        github.event.pull_request.head.repo.full_name != github.repository
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        (
          startsWith(github.event.comment.body, '/rerun-ai-dashboard-warning') ||
          startsWith(github.event.comment.body, '/check-ai-dashboard')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Scrape dashboard and comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ai-dashboard-warning -->';
            const { owner, repo } = context.repo;
            const rerunCommands = new Set(['/rerun-ai-dashboard-warning', '/check-ai-dashboard']);
            const issueNumber =
              context.payload.pull_request?.number ?? context.payload.issue?.number;
            const dashboardBaseUrl = 'https://aistupidlevel.info';
            const period = '24h';
            const scoreThreshold = 55;
            const trackedModelTargets = [
              { provider: 'openai', matchType: 'exact', matchValue: 'gpt-5.4', label: 'GPT-5.4' },
              {
                provider: 'google',
                matchType: 'exact',
                matchValue: 'gemini-3-pro-preview',
                label: 'Gemini newest',
              },
              {
                provider: 'xai',
                matchType: 'exact',
                matchValue: 'grok-4-latest',
                label: 'Grok newest',
              },
              {
                provider: 'anthropic',
                matchType: 'prefix',
                matchValue: 'claude-opus-4-5',
                label: 'Claude Opus 4.5',
              },
              {
                provider: 'anthropic',
                matchType: 'exact',
                matchValue: 'claude-opus-4-6',
                label: 'Claude Opus 4.6',
              },
              {
                provider: 'anthropic',
                matchType: 'exact',
                matchValue: 'claude-opus-4-7',
                label: 'Claude Opus 4.7',
              },
              {
                provider: 'anthropic',
                matchType: 'prefix',
                matchValue: 'claude-sonnet-4-5',
                label: 'Claude Sonnet 4.5',
              },
              {
                provider: 'anthropic',
                matchType: 'exact',
                matchValue: 'claude-sonnet-4-6',
                label: 'Claude Sonnet 4.6',
              },
            ];

            if (!issueNumber) {
              throw new Error('missing pull request number');
            }

            const pullRequest = context.payload.pull_request
              ? context.payload.pull_request
              : (await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: issueNumber,
                })).data;
            const author = pullRequest.user.login;

            if (context.eventName === 'issue_comment') {
              const commentBody = String(context.payload.comment?.body || '').trim();
              const command = commentBody.split(/\s+/)[0].toLowerCase();
              const commentAuthor = String(context.payload.comment?.user?.login || '');
              const association = String(context.payload.comment?.author_association || '');
              const isAuthorizedInvoker =
                commentAuthor === author ||
                ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(association);

              if (!rerunCommands.has(command)) {
                core.info(`Ignoring unsupported comment command: ${command}`);
                return;
              }

              if (!isAuthorizedInvoker) {
                core.warning(`Ignoring rerun command from unauthorized commenter ${commentAuthor}`);
                return;
              }
            }

            function normalizeProvider(provider) {
              return String(provider || '').toLowerCase();
            }

            function findTrackedTarget(model) {
              const provider = normalizeProvider(model.provider);
              const name = String(model.name || '').toLowerCase();

              return (
                trackedModelTargets.find((target) => {
                  if (provider !== target.provider) {
                    return false;
                  }

                  if (target.matchType === 'exact') {
                    return name === target.matchValue;
                  }

                  return name === target.matchValue || name.startsWith(`${target.matchValue}-`);
                }) || null
              );
            }

            function formatModelLine(model, issue) {
              const parts = [
                `score ${model.currentScore}`,
                `status ${model.status}`,
                `trend ${model.trend}`,
              ];

              if (issue) {
                parts.push(issue);
              }

              return `- ${model.trackedLabel}: \`${model.name}\` (${parts.join(', ')})`;
            }

            async function upsertComment(body) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });

              const existingComment = comments.find(
                (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker),
              );

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existingComment.id,
                  body,
                });
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
            }

            try {
              const [cachedResponse, alertsResponse] = await Promise.all([
                fetch(`${dashboardBaseUrl}/api/dashboard/cached?period=${period}`),
                fetch(`${dashboardBaseUrl}/api/dashboard/alerts`),
              ]);

              if (!cachedResponse.ok) {
                throw new Error(`cached endpoint returned ${cachedResponse.status}`);
              }

              if (!alertsResponse.ok) {
                throw new Error(`alerts endpoint returned ${alertsResponse.status}`);
              }

              const cachedPayload = await cachedResponse.json();
              const alertsPayload = await alertsResponse.json();
              const modelScores = Array.isArray(cachedPayload?.data?.modelScores)
                ? cachedPayload.data.modelScores
                : [];
              const alertData = Array.isArray(alertsPayload?.data) ? alertsPayload.data : [];

              if (modelScores.length === 0) {
                throw new Error('dashboard returned no model scores');
              }

              const issuesByModel = new Map();

              for (const alert of alertData) {
                const key = String(alert.name || '').toLowerCase();
                const issues = issuesByModel.get(key) || [];
                issues.push(String(alert.issue || '').trim());
                issuesByModel.set(key, issues.filter(Boolean));
              }

              const monitoredModels = modelScores
                .map((model) => {
                  const trackedTarget = findTrackedTarget(model);
                  if (!trackedTarget) {
                    return null;
                  }

                  return {
                    name: String(model.name || ''),
                    provider: normalizeProvider(model.provider),
                    trackedLabel: trackedTarget.label,
                    trackedMatchValue: trackedTarget.matchValue,
                    trackedMatchType: trackedTarget.matchType,
                    currentScore: Number(model.currentScore),
                    status: String(model.status || 'unknown'),
                    trend: String(model.trend || 'unknown'),
                    lastUpdated: String(model.lastUpdated || ''),
                    issues: issuesByModel.get(String(model.name || '').toLowerCase()) || [],
                  };
                })
                .filter(Boolean)
                .sort((left, right) => {
                  const leftIndex = trackedModelTargets.findIndex(
                    (target) =>
                      target.matchValue === left.trackedMatchValue &&
                      target.matchType === left.trackedMatchType &&
                      target.provider === left.provider,
                  );
                  const rightIndex = trackedModelTargets.findIndex(
                    (target) =>
                      target.matchValue === right.trackedMatchValue &&
                      target.matchType === right.trackedMatchType &&
                      target.provider === right.provider,
                  );

                  if (leftIndex !== rightIndex) {
                    return leftIndex - rightIndex;
                  }

                  return left.name.localeCompare(right.name);
                });

              if (monitoredModels.length === 0) {
                throw new Error('dashboard returned none of the tracked models');
              }

              const flaggedModels = monitoredModels.filter(
                (model) => Number.isFinite(model.currentScore) && model.currentScore <= scoreThreshold,
              );
              const healthyModels = monitoredModels.filter(
                (model) => !Number.isFinite(model.currentScore) || model.currentScore > scoreThreshold,
              );
              const snapshotTimestamp = monitoredModels
                .map((model) => Date.parse(model.lastUpdated))
                .filter(Number.isFinite)
                .reduce((latest, value) => Math.max(latest, value), 0);

              const flaggedLines = flaggedModels.length
                ? flaggedModels
                    .map((model) => formatModelLine(model, model.issues[0]))
                    .join('\n')
                : '- None';

              const healthyLines = healthyModels.length
                ? healthyModels.map((model) => formatModelLine(model)).join('\n')
                : '- None';

              const snapshotLine = snapshotTimestamp
                ? `Snapshot: ${new Date(snapshotTimestamp).toISOString()} from ${dashboardBaseUrl} (${period} view).`
                : `Source: ${dashboardBaseUrl} (${period} view).`;

              const body = flaggedModels.length
                ? [
                    marker,
                    '### AI dashboard warning',
                    '',
                    `@${author} the AI Stupid Level dashboard currently shows these tracked models at score ${scoreThreshold} or lower:`,
                    '',
                    flaggedLines,
                    '',
                    'If you used any of those models while authoring this PR, review the code carefully before merge.',
                    '',
                    '<details>',
                    '<summary>Tracked models not currently flagged</summary>',
                    '',
                    healthyLines,
                    '</details>',
                    '',
                    'To rerun this check on demand, comment `/rerun-ai-dashboard-warning` on this PR.',
                    '',
                    snapshotLine,
                  ].join('\n')
                : [
                    marker,
                    '### AI dashboard check',
                    '',
                  `@${author} the AI Stupid Level dashboard is not currently showing any tracked models at score ${scoreThreshold} or lower in the last 24 hours.`,
                    '',
                    '<details>',
                  '<summary>Tracked models currently not flagged</summary>',
                    '',
                    healthyLines,
                    '</details>',
                    '',
                    'To rerun this check on demand, comment `/rerun-ai-dashboard-warning` on this PR.',
                    '',
                    snapshotLine,
                  ].join('\n');

              await upsertComment(body);
              core.info(`Commented on PR #${issueNumber} with ${flaggedModels.length} flagged models.`);
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              const body = [
                marker,
                '### AI dashboard check unavailable',
                '',
                `@${author} the PR warning job could not read the AI Stupid Level dashboard just now, so no degraded-model warning could be generated.`,
                '',
                `Error: \`${message}\``,
                '',
                'To rerun this check on demand, comment `/rerun-ai-dashboard-warning` on this PR.',
              ].join('\n');

              await upsertComment(body);
              core.warning(message);
            }