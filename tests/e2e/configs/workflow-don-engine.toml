[[nodesets]]
  nodes = 4
  name = "workflow"
  don_family = "test-don-family"
  don_types = ["workflow"]
  override_mode = "all"
  http_port_range_start = 10100

  env_vars = { CL_EVM_CMD = "", CL_CRE_SETTINGS = "{\"global\":{\"VaultOrgIdAsSecretOwnerEnabled\":false}}", CL_CRE_SETTINGS_DEFAULT = "{\"RemoteExecutableWorkflowDONBindingEnabled\":\"true\",\"PerWorkflow\":{\"ConfidentialWorkflows\":{\"Enabled\":\"true\"}}}" }
  supported_evm_chains = [1337, 2337]
  capabilities = ["consensus", "confidential-workflows", "confidential-relay", "cron", "http-action", "http-trigger", "don-time"]
  exposes_remote_capabilities = true
  registry_based_launch_allowlist = ["cron-trigger@1.0.0"]

  [nodesets.db]
    image = "postgres:12.0"
    port = 13000

  [[nodesets.node_specs]]
    roles = ["plugin"]
    [nodesets.node_specs.node]
      capabilities = ["./binaries/confidential-workflows"]
      user_config_overrides = """
      [Log]
      Level = 'info'
      JSONConsole = true

      [Telemetry]
      Enabled = false
      LogStreamingEnabled = false

      [Tracing]
      Enabled = false

      [P2P]
      EnableExperimentalRageP2P = true

      [CRE]
      EnableDKGRecipient = true

      # Remove this bit to allow downloading workflows from remote sources
      [CRE.WorkflowFetcher]
      URL = "file:///home/chainlink/workflows"
      """

# Capability DON: hosts the vault capability.
# The workflow DON now also hosts confidential-relay on the same nodes,
# and discovers these remote capabilities via addRemoteCapabilities.
# Workflow DON also discovers these for pre-enclave secret fetching.
[[nodesets]]
  nodes = 4
  name = "capabilities"
  don_family = "test-don-family"
  don_types = ["capabilities"]
  override_mode = "each"
  http_port_range_start = 10400

  env_vars = { CL_EVM_CMD = "", CL_CRE_SETTINGS = "{\"global\":{\"VaultOrgIdAsSecretOwnerEnabled\":false}}", CL_CRE_SETTINGS_DEFAULT = "{\"RemoteExecutableWorkflowDONBindingEnabled\":\"true\"}" }
  supported_evm_chains = [1337, 2337]
  capabilities = ["vault"]
  exposes_remote_capabilities = true

  [nodesets.db]
    image = "postgres:12.0"
    port = 13300

  [[nodesets.node_specs]]
    roles = ["plugin"]
    [nodesets.node_specs.node]
      custom_ports = ["17770:7777"]
      user_config_overrides = """
      [Log]
      Level = 'info'
